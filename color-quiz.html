<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brand Color Quiz - BrandPawa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Same CSS variables and base styles from homepage */
        :root {
            --primary: #a300f9;
            --primary-dark: #7a00c4;
            --background: #1B1E35;
            --background-light: #252a45;
            --white: #ffffff;
            --gray-light: #f5f5f7;
            --gray: #e6e6e6;
            --text-dark: #111;
            --text-light: #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Avenir', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #0f1222 100%);
            min-height: 100vh;
            color: var(--white);
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 0;
        }

        /* Quiz Container */
        .quiz-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .quiz-header h1 {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            margin: 2rem 0;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--primary);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .question-text {
            font-size: 1.5rem;
            margin-bottom: 2rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }

        .option {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 1.2rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .option:hover {
            background: rgba(163, 0, 249, 0.2);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .option.selected {
            background: var(--primary);
            border-color: var(--primary);
        }

        .option input[type="radio"] {
            display: none;
        }

        .navigation-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
        }

        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            background: var(--primary);
            color: white;
            text-decoration: none;
            display: inline-block;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--primary);
            color: white;
        }

        .result-card {
            text-align: center;
            padding: 2rem;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            display: none;
        }

        .result-card.show {
            display: block;
        }

        .color-preview {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 2rem auto;
            border: 4px solid white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .signup-form {
            margin-top: 2rem;
            text-align: left;
            background: rgba(0,0,0,0.3);
            padding: 2rem;
            border-radius: 12px;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--gray);
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: 2px solid var(--primary);
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="quiz-header">
            <h1>🎨 Brand Color Quiz</h1>
            <p>Discover the perfect colors for your brand personality</p>
        </div>

        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>

        <!-- Quiz Container -->
        <div id="quizContainer">
            <div class="question-container" id="questionContainer"></div>
            
            <div class="navigation-buttons">
                <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()" disabled>Previous</button>
                <button class="btn" id="nextBtn" onclick="nextQuestion()">Next</button>
            </div>
        </div>

        <!-- Results Container -->
        <div id="resultContainer" class="result-card">
            <h2>Your Brand Color Is...</h2>
            <div id="colorPreview" class="color-preview"></div>
            <h3 id="colorName"></h3>
            <p id="colorDescription"></p>
            
            <!-- Signup Form -->
            <div class="signup-form">
                <h3>Save Your Results</h3>
                <p>Enter your details to get your full brand report</p>
                <form id="signupForm">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" required>
                    </div>
                    <button type="submit" class="btn" style="width: 100%;" id="saveResultBtn">
                        Save My Results
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // Initialize Supabase (replace with your credentials)
        const SUPABASE_URL = 'https://dztgtyfksnagfqugrsse.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6dGd0eWZrc25hZ2ZxdWdyc3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODcxNzUsImV4cCI6MjA4ODY2MzE3NX0.UmljeUQNFrTjXCOvvRnLZyyhBV5Y8bcyq7Rj-9NF9qg';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Quiz Questions
        const questions = [
            {
                text: "How would you describe your brand's personality?",
                options: ["Bold and Energetic", "Calm and Trustworthy", "Creative and Imaginative", "Luxurious and Sophisticated"]
            },
            {
                text: "What emotion do you want your brand to evoke?",
                options: ["Excitement", "Trust", "Curiosity", "Prestige"]
            },
            {
                text: "Which industry best describes your brand?",
                options: ["Technology / Innovation", "Health / Wellness", "Arts / Entertainment", "Finance / Luxury"]
            },
            {
                text: "What's your primary target audience?",
                options: ["Young professionals", "Families", "Creatives", "Executives"]
            }
        ];

        // Color results mapping
        const colorResults = {
            "Bold and Energetic": {
                name: "Electric Purple",
                hex: "#a300f9",
                description: "You're a visionary leader. Purple represents creativity, power, and innovation. Perfect for brands that want to stand out and challenge the status quo."
            },
            "Calm and Trustworthy": {
                name: "Deep Blue",
                hex: "#1B1E35",
                description: "Trust is your currency. Blue conveys stability, professionalism, and depth. Ideal for building long-term relationships."
            },
            "Creative and Imaginative": {
                name: "Vibrant Orange",
                hex: "#FF6B35",
                description: "Creativity flows through you. Orange represents enthusiasm, warmth, and innovation. Great for brands that inspire action."
            },
            "Luxurious and Sophisticated": {
                name: "Rich Gold",
                hex: "#FFD700",
                description: "Excellence is your standard. Gold symbolizes luxury, success, and premium value. Perfect for high-end positioning."
            }
        };

        let currentQuestion = 0;
        let answers = [];
        let quizCompleted = false;

        // Display current question
        function displayQuestion() {
            const container = document.getElementById('questionContainer');
            const q = questions[currentQuestion];
            
            let html = `
                <div class="question-text">${currentQuestion + 1}. ${q.text}</div>
                <div class="options-grid">
            `;
            
            q.options.forEach((option, index) => {
                const isSelected = answers[currentQuestion] === option;
                html += `
                    <div class="option ${isSelected ? 'selected' : ''}" onclick="selectOption(${index})">
                        <input type="radio" name="question" value="${option}" ${isSelected ? 'checked' : ''}>
                        <span>${option}</span>
                    </div>
                `;
            });
            
            html += `</div>`;
            container.innerHTML = html;
            
            // Update progress bar
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
            
            // Update navigation buttons
            document.getElementById('prevBtn').disabled = currentQuestion === 0;
            document.getElementById('nextBtn').textContent = currentQuestion === questions.length - 1 ? 'See Results' : 'Next';
        }

        // Select option
        function selectOption(index) {
            const q = questions[currentQuestion];
            answers[currentQuestion] = q.options[index];
            displayQuestion();
        }

        // Next question
        function nextQuestion() {
            if (!answers[currentQuestion]) {
                alert('Please select an option');
                return;
            }
            
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                displayQuestion();
            } else {
                showResults();
            }
        }

        // Previous question
        function prevQuestion() {
            if (currentQuestion > 0) {
                currentQuestion--;
                displayQuestion();
            }
        }

        // Show results
        function showResults() {
            // Determine result based on most frequent answer type
            const dominantAnswer = answers.reduce((acc, curr) => {
                acc[curr] = (acc[curr] || 0) + 1;
                return acc;
            }, {});
            
            const resultType = Object.keys(dominantAnswer).reduce((a, b) => 
                dominantAnswer[a] > dominantAnswer[b] ? a : b
            );
            
            const result = colorResults[resultType] || colorResults["Bold and Energetic"];
            
            // Hide quiz, show results
            document.getElementById('quizContainer').style.display = 'none';
            const resultContainer = document.getElementById('resultContainer');
            resultContainer.classList.add('show');
            
            // Display result
            document.getElementById('colorPreview').style.backgroundColor = result.hex;
            document.getElementById('colorName').textContent = result.name;
            document.getElementById('colorDescription').textContent = result.description;
            
            quizCompleted = true;
        }

        // Save result to Supabase
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const resultColor = document.getElementById('colorName').textContent;
            
            const button = document.getElementById('saveResultBtn');
            button.innerHTML = '<span class="loader"></span> Saving...';
            button.disabled = true;
            
            try {
                // Save to Supabase
                const { data, error } = await supabase
                    .from('quiz_results')
                    .insert([
                        {
                            first_name: firstName,
                            last_name: lastName,
                            email: email,
                            quiz_type: 'color',
                            result: resultColor,
                            answers: answers,
                            created_at: new Date()
                        }
                    ]);
                
                if (error) throw error;
                
                // Success message
                button.innerHTML = '✓ Saved! Redirecting...';
                
                // Redirect to dashboard or thank you page
                setTimeout(() => {
                    window.location.href = '/dashboard.html?welcome=true';
                }, 1500);
                
            } catch (error) {
                console.error('Error saving result:', error);
                button.innerHTML = 'Error - Try Again';
                button.disabled = false;
            }
        });

        // Initialize quiz
        displayQuestion();
    </script>
</body>
</html>
