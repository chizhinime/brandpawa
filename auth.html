<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up or Login - BrandPawa</title>
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Brand Colors */
        :root {
            --primary: #a300f9;
            --primary-dark: #7a00c4;
            --background: #1B1E35;
            --background-light: #252a45;
            --white: #ffffff;
            --error: #ff4444;
            --success: #00C851;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Avenir', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #0f1222 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 450px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--white);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .auth-header .logo span {
            color: var(--primary);
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem 1rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 5px 15px rgba(163, 0, 249, 0.4);
        }

        .form-container {
            transition: all 0.3s ease;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: white;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .form-group label i {
            color: var(--primary);
            margin-right: 0.5rem;
            width: 20px;
        }

        .form-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 0 3px rgba(163, 0, 249, 0.2);
        }

        .form-group input::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .input-icon-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            font-size: 1.1rem;
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            transition: color 0.3s;
        }

        .password-toggle:hover {
            color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-btn:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(163, 0, 249, 0.4);
        }

        .auth-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error-message {
            color: var(--error);
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.95rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            color: var(--success);
            background: rgba(0, 200, 81, 0.1);
            border: 1px solid rgba(0, 200, 81, 0.3);
            padding: 0.8rem;
            border-radius: 8px;
            margin-top: 1rem;
            text-align: center;
            font-size: 0.95rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            margin: 1.5rem 0;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        }

        .divider span {
            padding: 0 1rem;
            font-size: 0.9rem;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .social-btn {
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: white;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .social-btn i {
            font-size: 1.2rem;
        }

        .social-btn.google i { color: #DB4437; }
        .social-btn.github i { color: #333; }
        .social-btn.linkedin i { color: #0077B5; }

        .terms-text {
            text-align: center;
            margin-top: 1.5rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
        }

        .terms-text a {
            color: var(--primary);
            text-decoration: none;
        }

        .terms-text a:hover {
            text-decoration: underline;
        }

        /* Password strength indicator */
        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0%;
            transition: all 0.3s;
        }

        .strength-bar.weak { background: #ff4444; width: 33.33%; }
        .strength-bar.medium { background: #ffbb33; width: 66.66%; }
        .strength-bar.strong { background: #00C851; width: 100%; }

        .strength-text {
            font-size: 0.8rem;
            margin-top: 0.3rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <a href="index.html" class="logo">Brand<span>Pawa</span></a>
            <p>Your Brand Growth Partner</p>
        </div>

        <!-- Tab Buttons -->
        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')" id="loginTabBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
            <button class="tab-btn" onclick="switchTab('signup')" id="signupTabBtn">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </div>

        <!-- Error/Success Message Display -->
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <!-- Login Form -->
        <div id="loginForm" class="form-container">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            placeholder="you@example.com" 
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            placeholder="••••••••" 
                            required
                            autocomplete="current-password"
                        >
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('loginPassword')"></i>
                    </div>
                </div>

                <div style="text-align: right; margin-bottom: 1rem;">
                    <a href="#" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">
                        Forgot password?
                    </a>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <span>Login to BrandPawa</span>
                </button>
            </form>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="form-container" style="display: none;">
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label><i class="fas fa-user"></i> First Name</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            id="signupFirstName" 
                            placeholder="John" 
                            required
                            autocomplete="given-name"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-user"></i> Last Name</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-user input-icon"></i>
                        <input 
                            type="text" 
                            id="signupLastName" 
                            placeholder="Doe" 
                            required
                            autocomplete="family-name"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-envelope input-icon"></i>
                        <input 
                            type="email" 
                            id="signupEmail" 
                            placeholder="you@example.com" 
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-lock input-icon"></i>
                        <input 
                            type="password" 
                            id="signupPassword" 
                            placeholder="Create a strong password" 
                            required
                            minlength="6"
                            autocomplete="new-password"
                            onkeyup="checkPasswordStrength()"
                        >
                        <i class="fas fa-eye password-toggle" onclick="togglePassword('signupPassword')"></i>
                    </div>
                    <!-- Password strength indicator -->
                    <div class="password-strength">
                        <div id="strengthBar" class="strength-bar"></div>
                    </div>
                    <div id="strengthText" class="strength-text">Use at least 6 characters</div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-building"></i> Brand Name (Optional)</label>
                    <div class="input-icon-wrapper">
                        <i class="fas fa-building input-icon"></i>
                        <input 
                            type="text" 
                            id="signupBrandName" 
                            placeholder="Your brand or business name"
                            autocomplete="organization"
                        >
                    </div>
                </div>

                <div style="margin: 1rem 0; color: rgba(255,255,255,0.7); font-size: 0.9rem;">
                    <input type="checkbox" id="termsCheckbox" required style="margin-right: 0.5rem;">
                    <label for="termsCheckbox">
                        I agree to the <a href="terms.html" style="color: var(--primary);">Terms of Service</a> and 
                        <a href="privacy.html" style="color: var(--primary);">Privacy Policy</a>
                    </label>
                </div>

                <button type="submit" class="auth-btn" id="signupBtn">
                    <span>Create Free Account</span>
                </button>
            </form>
        </div>

        <!-- Social Login Options -->
        <div class="divider">
            <span>OR CONTINUE WITH</span>
        </div>

        <div class="social-login">
            <button class="social-btn google" onclick="socialLogin('google')">
                <i class="fab fa-google"></i> Google
            </button>
            <button class="social-btn github" onclick="socialLogin('github')">
                <i class="fab fa-github"></i> GitHub
            </button>
        </div>

        <div class="terms-text">
            By continuing, you agree to BrandPawa's <a href="terms.html">Terms</a> and <a href="privacy.html">Privacy Policy</a>
        </div>
    </div>

    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ============================================
        // SUPABASE CONFIGURATION - UPDATE THESE VALUES
        // ============================================
        const SUPABASE_URL = 'https://dztgtyfksnagfqugrsse.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6dGd0eWZrc25hZ2ZxdWdyc3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODcxNzUsImV4cCI6MjA4ODY2MzE3NX0.UmljeUQNFrTjXCOvvRnLZyyhBV5Y8bcyq7Rj-9NF9qg';
        
        // Initialize Supabase client
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
        });

        // Check if user is already logged in
        checkUser();

        async function checkUser() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                if (user && !error) {
                    // User is logged in, redirect to dashboard
                    window.location.href = '/dashboard.html';
                }
            } catch (error) {
                console.log('No active session');
            }
        }

        // Check URL parameters for signup
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('signup') === 'true') {
            switchTab('signup');
        }

        // Tab switching function
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTabBtn');
            const signupTab = document.getElementById('signupTabBtn');
            const errorMsg = document.getElementById('errorMessage');
            const successMsg = document.getElementById('successMessage');

            // Hide any messages
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
            }
        }

        // Toggle password visibility
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling;
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Password strength checker
        function checkPasswordStrength() {
            const password = document.getElementById('signupPassword').value;
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('strengthText');

            // Remove all classes
            strengthBar.className = 'strength-bar';

            if (password.length === 0) {
                strengthBar.style.width = '0%';
                strengthText.textContent = 'Use at least 6 characters';
                return;
            }

            // Calculate strength
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength += 1;
            
            // Contains number
            if (/\d/.test(password)) strength += 1;
            
            // Contains special character or uppercase
            if (/[!@#$%^&*(),.?":{}|<>]|[A-Z]/.test(password)) strength += 1;

            // Update UI based on strength
            if (password.length < 6) {
                strengthBar.classList.add('weak');
                strengthText.textContent = 'Too short - minimum 6 characters';
            } else if (strength <= 1) {
                strengthBar.classList.add('weak');
                strengthText.textContent = 'Weak password';
            } else if (strength === 2) {
                strengthBar.classList.add('medium');
                strengthText.textContent = 'Medium password';
            } else {
                strengthBar.classList.add('strong');
                strengthText.textContent = 'Strong password';
            }
        }

        // Show error message
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Show success message
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
        }

        // ============================================
        // LOGIN HANDLER
        // ============================================
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMessage');

            // Disable button and show loading
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span class="loader"></span> Logging in...';
            errorDiv.classList.remove('show');

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                // Success! Show message and redirect
                showSuccess('Login successful! Redirecting...');
                
                setTimeout(() => {
                    window.location.href = '/dashboard.html';
                }, 1500);

            } catch (error) {
                console.error('Login error:', error);
                
                // User-friendly error messages
                let errorMessage = 'Login failed. Please try again.';
                
                if (error.message.includes('Invalid login credentials')) {
                    errorMessage = 'Invalid email or password. Please try again.';
                } else if (error.message.includes('Email not confirmed')) {
                    errorMessage = 'Please verify your email address before logging in.';
                } else if (error.message.includes('rate limit')) {
                    errorMessage = 'Too many attempts. Please try again later.';
                }
                
                showError(errorMessage);
                
                // Re-enable button
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>Login to BrandPawa</span>';
            }
        }

        // ============================================
        // SIGNUP HANDLER
        // ============================================
        async function handleSignup(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('signupFirstName').value;
            const lastName = document.getElementById('signupLastName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const brandName = document.getElementById('signupBrandName').value;
            const termsChecked = document.getElementById('termsCheckbox').checked;
            
            const signupBtn = document.getElementById('signupBtn');
            const errorDiv = document.getElementById('errorMessage');

            // Validate terms
            if (!termsChecked) {
                showError('You must agree to the Terms of Service and Privacy Policy');
                return;
            }

            // Validate password strength
            if (password.length < 6) {
                showError('Password must be at least 6 characters long');
                return;
            }

            // Disable button and show loading
            signupBtn.disabled = true;
            signupBtn.innerHTML = '<span class="loader"></span> Creating account...';
            errorDiv.classList.remove('show');

            try {
                // Sign up with Supabase
                const { data: authData, error: authError } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName,
                            brand_name: brandName || null,
                            subscription_tier: 'free',
                            created_at: new Date().toISOString()
                        },
                        emailRedirectTo: `${window.location.origin}/dashboard.html`
                    }
                });

                if (authError) throw authError;

                // Check if user was created
                if (authData.user) {
                    // Success! Show message
                    showSuccess('Account created successfully! Please check your email for verification.');
                    
                    // Reset form
                    document.getElementById('signupForm').reset();
                    
                    // Switch to login tab after 3 seconds
                    setTimeout(() => {
                        switchTab('login');
                        signupBtn.disabled = false;
                        signupBtn.innerHTML = '<span>Create Free Account</span>';
                    }, 3000);
                }

            } catch (error) {
                console.error('Signup error:', error);
                
                // User-friendly error messages
                let errorMessage = 'Signup failed. Please try again.';
                
                if (error.message.includes('User already registered')) {
                    errorMessage = 'An account with this email already exists. Please login instead.';
                } else if (error.message.includes('weak password')) {
                    errorMessage = 'Password is too weak. Please use a stronger password.';
                } else if (error.message.includes('Invalid email')) {
                    errorMessage = 'Please enter a valid email address.';
                }
                
                showError(errorMessage);
                
                // Re-enable button
                signupBtn.disabled = false;
                signupBtn.innerHTML = '<span>Create Free Account</span>';
            }
        }

        // ============================================
        // SOCIAL LOGIN HANDLER
        // ============================================
        async function socialLogin(provider) {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: provider,
                    options: {
                        redirectTo: `${window.location.origin}/dashboard.html`
                    }
                });

                if (error) throw error;

            } catch (error) {
                console.error(`${provider} login error:`, error);
                showError(`Failed to login with ${provider}. Please try again.`);
            }
        }

        // Handle email verification redirect
        async function handleEmailVerification() {
            const { data, error } = await supabase.auth.getSession();
            
            if (error) {
                console.error('Session error:', error);
                return;
            }

            // Check if user just verified email
            if (window.location.hash.includes('access_token')) {
                showSuccess('Email verified! You can now login.');
                setTimeout(() => {
                    window.location.href = '/auth.html';
                }, 2000);
            }
        }

        // Call on page load
        handleEmailVerification();

    </script>
</body>
</html>
