<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - BrandPawa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Reuse same CSS variables */
        :root {
            --primary: #a300f9;
            --primary-dark: #7a00c4;
            --background: #1B1E35;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Avenir', sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #0f1222 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-container {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem 2rem;
            width: 90%;
            max-width: 450px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--white);
            opacity: 0.8;
        }

        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: transparent;
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: white;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: 2px solid var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }

        .error-message {
            color: #ff4444;
            margin-top: 1rem;
            text-align: center;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>Brand<span style="color: white;">Pawa</span></h1>
            <p>Your Brand Growth Partner</p>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')" id="loginTab">Login</button>
            <button class="tab-btn" onclick="switchTab('signup')" id="signupTab">Sign Up</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="auth-btn" id="loginBtn">Login</button>
            <div id="loginError" class="error-message"></div>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" onsubmit="handleSignup(event)" style="display: none;">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="signupFirstName" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="signupLastName" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="signupEmail" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="signupPassword" required minlength="6">
            </div>
            <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>
            <div id="signupError" class="error-message"></div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://dztgtyfksnagfqugrsse.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6dGd0eWZrc25hZ2ZxdWdyc3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODcxNzUsImV4cCI6MjA4ODY2MzE3NX0.UmljeUQNFrTjXCOvvRnLZyyhBV5Y8bcyq7Rj-9NF9qg';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Check if user is already logged in
        checkUser();

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                window.location.href = '/dashboard.html';
            }
        }

        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');

            if (tab === 'login') {
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
            } else {
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            btn.innerHTML = '<span class="loader"></span> Logging in...';
            btn.disabled = true;
            errorDiv.textContent = '';

            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) throw error;

                window.location.href = '/dashboard.html';
            } catch (error) {
                errorDiv.textContent = error.message;
                btn.innerHTML = 'Login';
                btn.disabled = false;
            }
        }

        async function handleSignup(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('signupFirstName').value;
            const lastName = document.getElementById('signupLastName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');
            const errorDiv = document.getElementById('signupError');

            btn.innerHTML = '<span class="loader"></span> Creating account...';
            btn.disabled = true;
            errorDiv.textContent = '';

            try {
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName
                        }
                    }
                });

                if (error) throw error;

                btn.innerHTML = '✓ Account created! Redirecting...';
                
                setTimeout(() => {
                    window.location.href = '/dashboard.html?welcome=true';
                }, 1500);

            } catch (error) {
                errorDiv.textContent = error.message;
                btn.innerHTML = 'Create Account';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
