<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up or Login - BrandPawa</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --primary: #a300f9;
            --primary-dark: #7a00c4;
            --primary-light: #c24bff;
            --background: #1B1E35;
            --background-light: #252a45;
            --white: #ffffff;
            --error: #ff4444;
            --success: #00C851;
            --gray-light: #f5f5f7;
            --text-dark: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Avenir', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #0f1222 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .auth-container {
            width: 100%;
            max-width: 480px;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 2.5rem 2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--white);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1rem;
        }

        .auth-header .logo span {
            color: var(--primary);
        }

        .auth-header h2 {
            color: var(--white);
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }

        .tab-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: rgba(0, 0, 0, 0.2);
            padding: 0.5rem;
            border-radius: 50px;
        }

        .tab-btn {
            flex: 1;
            padding: 0.8rem;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            font-size: 1rem;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 10px rgba(163, 0, 249, 0.3);
        }

        .form-container {
            transition: all 0.3s;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--white);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            color: rgba(255, 255, 255, 0.5);
            font-size: 1.1rem;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: var(--white);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.1);
        }

        .input-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 1.1rem;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        .auth-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .auth-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(163, 0, 249, 0.3);
        }

        .auth-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-message {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid var(--error);
            color: #ff8a8a;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(0, 200, 81, 0.1);
            border: 1px solid var(--success);
            color: #8affb8;
            padding: 1rem;
            border-radius: 12px;
            margin-top: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: rgba(255, 255, 255, 0.5);
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 1rem;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .social-btn {
            padding: 0.8rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--primary);
        }

        .social-btn i {
            font-size: 1.2rem;
        }

        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .terms {
            margin-top: 1rem;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.4);
            text-align: center;
        }

        .terms a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        .terms a:hover {
            color: var(--primary);
        }

        .password-strength {
            margin-top: 0.5rem;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-bar {
            height: 100%;
            width: 0;
            transition: all 0.3s;
        }

        .strength-bar.weak {
            width: 33.33%;
            background: #ff4444;
        }

        .strength-bar.medium {
            width: 66.66%;
            background: #ffbb33;
        }

        .strength-bar.strong {
            width: 100%;
            background: #00C851;
        }

        .back-to-home {
            text-align: center;
            margin-top: 1.5rem;
        }

        .back-to-home a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .back-to-home a:hover {
            color: var(--primary);
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem;
            }
            
            .social-login {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <a href="index.html" class="logo">Brand<span>Pawa</span></a>
                <h2>Welcome Back 👋</h2>
                <p>Continue your brand growth journey</p>
            </div>

            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('login')" id="loginTab">Login</button>
                <button class="tab-btn" onclick="switchTab('signup')" id="signupTab">Create Account</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)" class="form-container">
                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>

                <div style="text-align: right; margin-bottom: 1rem;">
                    <a href="#" style="color: var(--primary); font-size: 0.9rem;">Forgot password?</a>
                </div>

                <button type="submit" class="auth-btn" id="loginBtn">
                    <span>Log In</span>
                </button>

                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn" onclick="handleGoogleLogin()">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-btn" onclick="handleGithubLogin()">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>
            </form>

            <!-- Signup Form -->
            <form id="signupForm" onsubmit="handleSignup(event)" class="form-container" style="display: none;">
                <div class="form-group">
                    <label>First Name</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" id="signupFirstName" placeholder="John" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Last Name</label>
                    <div class="input-wrapper">
                        <i class="far fa-user"></i>
                        <input type="text" id="signupLastName" placeholder="Doe" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="far fa-envelope"></i>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Brand Name (Optional)</label>
                    <div class="input-wrapper">
                        <i class="fas fa-briefcase"></i>
                        <input type="text" id="signupBrand" placeholder="Your brand name">
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="signupPassword" placeholder="Create a strong password" 
                               onkeyup="checkPasswordStrength()" required minlength="6">
                        <button type="button" class="toggle-password" onclick="togglePassword('signupPassword')">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strengthBar"></div>
                    </div>
                    <div style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 0.3rem;">
                        Minimum 6 characters
                    </div>
                </div>

                <div class="terms">
                    By creating an account, you agree to our 
                    <a href="terms.html">Terms of Service</a> and 
                    <a href="privacy.html">Privacy Policy</a>
                </div>

                <button type="submit" class="auth-btn" id="signupBtn">
                    <span>Create Account</span>
                </button>

                <div class="divider">
                    <span>OR</span>
                </div>

                <div class="social-login">
                    <button type="button" class="social-btn" onclick="handleGoogleLogin()">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button type="button" class="social-btn" onclick="handleGithubLogin()">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                </div>
            </form>

            <!-- Error Message Display -->
            <div id="errorMessage" class="error-message"></div>
            
            <!-- Success Message Display -->
            <div id="successMessage" class="success-message"></div>

            <div class="auth-footer">
                <span id="toggleText">Don't have an account?</span>
                <a href="#" onclick="switchTab('signup'); return false;" id="toggleLink">Sign up</a>
            </div>

            <div class="back-to-home">
                <a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <!-- Load Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // ==================== SUPABASE CONFIGURATION ====================
        // IMPORTANT: Replace these with your actual Supabase credentials
        const SUPABASE_URL = 'https://dztgtyfksnagfqugrsse.supabase.co'; // e.g., https://xyzabc.supabase.co
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR6dGd0eWZrc25hZ2ZxdWdyc3NlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODcxNzUsImV4cCI6MjA4ODY2MzE3NX0.UmljeUQNFrTjXCOvvRnLZyyhBV5Y8bcyq7Rj-9NF9qg'; // your anon/public key
        
        // Initialize Supabase client
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: {
                autoRefreshToken: true,
                persistSession: true,
                detectSessionInUrl: true
            }
        });

        // ==================== CHECK IF USER IS ALREADY LOGGED IN ====================
        checkUser();

        async function checkUser() {
            try {
                const { data: { user }, error } = await supabase.auth.getUser();
                
                if (error) {
                    console.log('No active session or error:', error.message);
                    return;
                }
                
                if (user) {
                    console.log('User already logged in:', user.email);
                    // Redirect to dashboard
                    window.location.href = '/dashboard.html';
                }
            } catch (error) {
                console.error('Error checking user:', error);
            }
        }

        // ==================== CHECK URL PARAMETERS ====================
        // Check if we should show signup form (e.g., from ?signup=true)
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('signup') === 'true') {
            switchTab('signup');
        }

        // ==================== TAB SWITCHING ====================
        function switchTab(tab) {
            const loginForm = document.getElementById('loginForm');
            const signupForm = document.getElementById('signupForm');
            const loginTab = document.getElementById('loginTab');
            const signupTab = document.getElementById('signupTab');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');
            const headerTitle = document.querySelector('.auth-header h2');
            const headerSubtitle = document.querySelector('.auth-header p');
            
            // Clear any previous messages
            hideMessages();

            if (tab === 'login') {
                // Show login, hide signup
                loginForm.style.display = 'block';
                signupForm.style.display = 'none';
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                
                // Update text
                toggleText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign up';
                toggleLink.setAttribute('onclick', 'switchTab("signup"); return false;');
                
                headerTitle.textContent = 'Welcome Back 👋';
                headerSubtitle.textContent = 'Continue your brand growth journey';
            } else {
                // Show signup, hide login
                loginForm.style.display = 'none';
                signupForm.style.display = 'block';
                loginTab.classList.remove('active');
                signupTab.classList.add('active');
                
                // Update text
                toggleText.textContent = 'Already have an account?';
                toggleLink.textContent = 'Log in';
                toggleLink.setAttribute('onclick', 'switchTab("login"); return false;');
                
                headerTitle.textContent = 'Create Account 🚀';
                headerSubtitle.textContent = 'Start your brand growth journey';
            }
        }

        // ==================== PASSWORD TOGGLE ====================
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = event.currentTarget.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // ==================== PASSWORD STRENGTH CHECKER ====================
        function checkPasswordStrength() {
            const password = document.getElementById('signupPassword').value;
            const strengthBar = document.getElementById('strengthBar');
            
            // Remove all classes
            strengthBar.classList.remove('weak', 'medium', 'strong');
            
            if (password.length === 0) {
                strengthBar.style.width = '0';
                return;
            }
            
            let strength = 0;
            
            // Length check
            if (password.length >= 8) strength += 1;
            if (password.length >= 12) strength += 1;
            
            // Character variety checks
            if (/[a-z]/.test(password)) strength += 0.5;
            if (/[A-Z]/.test(password)) strength += 0.5;
            if (/[0-9]/.test(password)) strength += 0.5;
            if (/[^a-zA-Z0-9]/.test(password)) strength += 0.5;
            
            if (strength < 2) {
                strengthBar.classList.add('weak');
            } else if (strength < 3.5) {
                strengthBar.classList.add('medium');
            } else {
                strengthBar.classList.add('strong');
            }
        }

        // ==================== MESSAGE HANDLING ====================
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            
            // Hide success message if showing
            document.getElementById('successMessage').classList.remove('show');
            
            // Auto hide after 5 seconds
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.classList.add('show');
            
            // Hide error message if showing
            document.getElementById('errorMessage').classList.remove('show');
        }

        function hideMessages() {
            document.getElementById('errorMessage').classList.remove('show');
            document.getElementById('successMessage').classList.remove('show');
        }

        // ==================== LOGIN HANDLER ====================
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            
            // Basic validation
            if (!email || !password) {
                showError('Please enter both email and password');
                return;
            }
            
            // Show loading state
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loader"></span> Logging in...';
            btn.disabled = true;
            hideMessages();

            try {
                console.log('Attempting login for:', email);
                
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    console.error('Login error:', error);
                    
                    // Handle specific error cases
                    if (error.message.includes('Invalid login credentials')) {
                        showError('Invalid email or password. Please try again.');
                    } else if (error.message.includes('Email not confirmed')) {
                        showError('Please verify your email address first.');
                    } else {
                        showError(error.message);
                    }
                    
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }

                if (data.user) {
                    console.log('Login successful:', data.user.email);
                    showSuccess('Login successful! Redirecting...');
                    
                    // Store session info
                    try {
                        await supabase.from('user_sessions').insert([
                            {
                                user_id: data.user.id,
                                ip_address: 'web',
                                user_agent: navigator.userAgent
                            }
                        ]);
                    } catch (sessionError) {
                        console.log('Session tracking not critical:', sessionError);
                    }
                    
                    // Redirect to dashboard
                    setTimeout(() => {
                        window.location.href = '/dashboard.html';
                    }, 1500);
                }

            } catch (error) {
                console.error('Unexpected error:', error);
                showError('An unexpected error occurred. Please try again.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ==================== SIGNUP HANDLER ====================
        async function handleSignup(e) {
            e.preventDefault();
            
            const firstName = document.getElementById('signupFirstName').value.trim();
            const lastName = document.getElementById('signupLastName').value.trim();
            const email = document.getElementById('signupEmail').value.trim();
            const brandName = document.getElementById('signupBrand').value.trim();
            const password = document.getElementById('signupPassword').value;
            const btn = document.getElementById('signupBtn');
            
            // Validation
            if (!firstName || !lastName || !email || !password) {
                showError('Please fill in all required fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be at least 6 characters');
                return;
            }
            
            // Email validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Show loading state
            const originalText = btn.innerHTML;
            btn.innerHTML = '<span class="loader"></span> Creating account...';
            btn.disabled = true;
            hideMessages();

            try {
                console.log('Attempting signup for:', email);
                
                const { data, error } = await supabase.auth.signUp({
                    email: email,
                    password: password,
                    options: {
                        data: {
                            first_name: firstName,
                            last_name: lastName,
                            brand_name: brandName || null
                        },
                        emailRedirectTo: window.location.origin + '/dashboard.html'
                    }
                });

                if (error) {
                    console.error('Signup error:', error);
                    
                    if (error.message.includes('User already registered')) {
                        showError('An account with this email already exists. Please log in instead.');
                        
                        // Switch to login tab after 2 seconds
                        setTimeout(() => {
                            switchTab('login');
                            document.getElementById('loginEmail').value = email;
                        }, 2000);
                    } else {
                        showError(error.message);
                    }
                    
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    return;
                }

                if (data.user) {
                    console.log('Signup successful:', data.user.email);
                    
                    // Check if email confirmation is required
                    if (data.user.identities && data.user.identities.length === 0) {
                        showSuccess('Account created! Please check your email to verify your account before logging in.');
                    } else {
                        showSuccess('Account created successfully! Redirecting to dashboard...');
                        
                        // Redirect to dashboard
                        setTimeout(() => {
                            window.location.href = '/dashboard.html?welcome=true';
                        }, 2000);
                    }
                }

            } catch (error) {
                console.error('Unexpected error:', error);
                showError('An unexpected error occurred. Please try again.');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // ==================== SOCIAL LOGIN HANDLERS ====================
        async function handleGoogleLogin() {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) {
                    showError('Google login failed: ' + error.message);
                }
            } catch (error) {
                showError('Failed to initiate Google login');
            }
        }

        async function handleGithubLogin() {
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'github',
                    options: {
                        redirectTo: window.location.origin + '/dashboard.html'
                    }
                });
                
                if (error) {
                    showError('GitHub login failed: ' + error.message);
                }
            } catch (error) {
                showError('Failed to initiate GitHub login');
            }
        }

        // ==================== FORGOT PASSWORD ====================
        // Add this to the "Forgot password?" link
        document.querySelector('a[href="#"]').addEventListener('click', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value;
            
            if (!email) {
                showError('Please enter your email address first');
                return;
            }
            
            try {
                const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html',
                });
                
                if (error) {
                    showError(error.message);
                } else {
                    showSuccess('Password reset email sent! Check your inbox.');
                }
            } catch (error) {
                showError('Failed to send reset email');
            }
        });

        // ==================== PERSIST SESSION ====================
        // Listen for auth state changes
        supabase.auth.onAuthStateChange((event, session) => {
            console.log('Auth event:', event);
            
            if (event === 'SIGNED_IN') {
                console.log('User signed in:', session?.user?.email);
            } else if (event === 'SIGNED_OUT') {
                console.log('User signed out');
            } else if (event === 'USER_UPDATED') {
                console.log('User updated');
            }
        });
    </script>
</body>
